<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="0.6" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="60%">
      <stop offset="0" stop-color="#f5a623" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="#f5a623"/>

  <!-- tag -->
  <text x="80" y="180" font-family="DM Mono, monospace" font-size="20" fill="#f5a623" letter-spacing="6">// FRACTIONAL FLEET MANAGEMENT</text>

  <!-- headline -->
  <text x="80" y="320" font-family="Bebas Neue, Impact, sans-serif" font-size="160" fill="#e6edf3" letter-spacing="6">DRIVE <tspan fill="#f5a623">SMARTER.</tspan></text>
  <text x="80" y="470" font-family="Bebas Neue, Impact, sans-serif" font-size="160" fill="#e6edf3" letter-spacing="6">MANAGE <tspan fill="#f5a623">LESS.</tspan></text>

  <!-- footer brand -->
  <text x="80" y="570" font-family="Bebas Neue, Impact, sans-serif" font-size="36" fill="#f5a623" letter-spacing="4">FLEET<tspan fill="#e6edf3">GUARD</tspan> PRO</text>
  <text x="80" y="600" font-family="DM Mono, monospace" font-size="14" fill="#7d8590" letter-spacing="2">FLEETGUARDPRO.COM · COLUMBUS, OH</text>

  <!-- truck icon glyph -->
  <g transform="translate(940, 380) scale(2.4)" fill="none" stroke="#f5a623" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
    <path d="M 0 30 L 0 10 L 50 10 L 50 30 Z"/>
    <path d="M 50 18 L 65 18 L 75 28 L 75 30 L 50 30 Z"/>
    <circle cx="14" cy="34" r="6" fill="#0a0a0a"/>
    <circle cx="62" cy="34" r="6" fill="#0a0a0a"/>
  </g>
</svg>
